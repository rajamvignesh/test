name: Run Python Tests
on:
  push:
    branches:
      - test_branch

# env:
#   deploy_status_value: "none"

jobs:
  build_and_test:
    name: Build and test
    runs-on: ubuntu-latest
    outputs: 
      deploty_status_val : ${{steps.Deploy_status.outputs.deploy_status_value}}
    steps:
      - uses: actions/checkout@v2
      - name: Install Python 3
        uses: actions/setup-python@v1
        with:
          python-version: 3.6
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get Env Variables
        run: |
          echo "LM_URL=${{ secrets.LM_URL }}" >> $GITHUB_ENV
          echo "DASHBOARD_NAME=${{ secrets.DASHBOARD_NAME }}" >> $GITHUB_ENV
      - name: Run tests with pytest
        run: pytest

      - name: Check the git build status
        if: job.status == 'success'
        run: |
          echo "test case passed"

      - name: Get Deploy status
        id: Deploy_status
        run: echo "::set-output name=deploy_status_value::${{ job.status }}"


  output:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Try to get deploy status 
        run: |
          echo values --------- "${{ needs.build_and_test.outputs.deploty_status_val }}"

